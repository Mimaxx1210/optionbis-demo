<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>OptionBIS — Démo interactive</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #F7F6F3;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
  }
  #root {
    display: flex;
    flex-direction: column;
    height: 560px;
    width: 100%;
    max-width: 680px;
    border: 1px solid #E8E4DC;
    border-radius: 14px;
    overflow: hidden;
    background: #ffffff;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  }
  .hdr {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 18px;
    border-bottom: 1px solid #E8E4DC;
    background: #F7F6F3;
  }
  .logo {
    width: 32px; height: 32px;
    border-radius: 8px;
    background: #1A2E44;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .logo svg { width: 15px; height: 15px; }
  .hname { font-size: 14px; font-weight: 600; color: #1A1A1A; }
  .hsub { font-size: 11px; color: #7A7A7A; }
  .hright { margin-left: auto; display: flex; align-items: center; gap: 6px; font-size: 11px; color: #4CAF50; }
  .hdot { width: 6px; height: 6px; border-radius: 50%; background: #4CAF50; animation: p 2s infinite; }
  @keyframes p { 0%,100%{opacity:1} 50%{opacity:.3} }
  .msgs {
    flex: 1;
    overflow-y: auto;
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .m { display: flex; align-items: flex-end; gap: 8px; opacity: 0; transition: opacity .3s, transform .3s; transform: translateY(6px); }
  .m.show { opacity: 1; transform: translateY(0); }
  .m.user { flex-direction: row-reverse; }
  .av {
    width: 26px; height: 26px; border-radius: 50%;
    background: #1A2E44;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; color: #fff; font-weight: 600;
    flex-shrink: 0;
  }
  .b {
    max-width: 80%;
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 13.5px;
    line-height: 1.65;
    color: #1A1A1A;
    white-space: pre-wrap;
  }
  .m.bot .b { background: #F7F6F3; border: 1px solid #E8E4DC; border-bottom-left-radius: 3px; }
  .m.user .b { background: #1A2E44; color: #fff; border-bottom-right-radius: 3px; }
  .typ span {
    display: inline-block; width: 5px; height: 5px;
    border-radius: 50%; background: #7A7A7A;
    margin: 0 2px; animation: bounce 1.1s infinite;
  }
  .typ span:nth-child(2){animation-delay:.2s} .typ span:nth-child(3){animation-delay:.4s}
  @keyframes bounce { 0%,80%,100%{transform:translateY(0);opacity:.3} 40%{transform:translateY(-4px);opacity:1} }
  .chips {
    display: flex; flex-wrap: wrap; gap: 7px;
    padding: 0 18px 12px;
  }
  .chip {
    padding: 7px 14px;
    border-radius: 20px;
    background: #F7F6F3;
    border: 1px solid #E8E4DC;
    font-size: 12.5px;
    color: #1A1A1A;
    cursor: pointer;
    font-family: inherit;
    transition: border-color .15s, background .15s;
  }
  .chip:hover { border-color: #1A2E44; background: #EAF3F8; }
  .footer {
    display: flex;
    align-items: center;
    padding: 10px 16px;
    border-top: 1px solid #E8E4DC;
    background: #F7F6F3;
  }
  .footer span { font-size: 11px; color: #7A7A7A; }
  .restart {
    margin-left: auto;
    font-size: 12px;
    color: #3B82A0;
    background: none;
    border: none;
    cursor: pointer;
    font-family: inherit;
    text-decoration: underline;
  }
</style>
</head>
<body>

<div id="root">
  <div class="hdr">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div>
      <div class="hname">OptionBIS</div>
      <div class="hsub">Copilote d'orientation augmentée · Vertex AI · GCP</div>
    </div>
    <div class="hright"><div class="hdot"></div>démo</div>
  </div>

  <div class="msgs" id="msgs"></div>
  <div class="chips" id="chips"></div>

  <div class="footer">
    <span>Démo interactive · OptionBIS v2</span>
    <button class="restart" id="restartBtn">↺ Recommencer</button>
  </div>
</div>

<script>
const FLOWS = {
  start: {
    bot: "Bonjour ! Je suis OptionBIS, ton copilote d'orientation 🎓\nTu en es où dans ta réflexion sur la suite de tes études ?",
    chips: [
      { label: "Aucune idée pour l'instant", next: "zero_idea" },
      { label: "J'ai une vague idée", next: "vague_idea" },
      { label: "J'ai un projet précis", next: "precise_idea" }
    ]
  },
  zero_idea: {
    user: "Aucune idée pour l'instant",
    bot: "Pas de panique, c'est très fréquent à ton stade ! Pour qu'on puisse explorer ensemble, dis-moi : qu'est-ce que tu aimes faire en dehors des cours ?",
    chips: [
      { label: "J'aime le contact humain, aider les autres", next: "zero_human" },
      { label: "Je suis plutôt créatif, j'aime créer des choses", next: "zero_creative" },
      { label: "J'aime analyser, résoudre des problèmes", next: "zero_analyst" }
    ]
  },
  zero_human: {
    user: "J'aime le contact humain, aider les autres",
    bot: "C'est une vraie force ! Les métiers qui combinent relation humaine et impact concret sont nombreux. Tu te verrais plutôt dans un rôle d'accompagnement, d'enseignement ou de soin ?",
    chips: [
      { label: "Plutôt accompagnement / coaching", next: "reco_social" },
      { label: "Enseignement ou formation", next: "reco_education" }
    ]
  },
  zero_creative: {
    user: "Je suis plutôt créatif, j'aime créer des choses",
    bot: "Intéressant ! La créativité peut s'exprimer de plein de façons. Tu te vois plutôt dans un univers visuel (design, communication), technique (architecture, ingénierie) ou culturel (arts, médias) ?",
    chips: [
      { label: "Visuel — design, communication", next: "reco_design" },
      { label: "Technique — construire, concevoir", next: "reco_tech" }
    ]
  },
  zero_analyst: {
    user: "J'aime analyser, résoudre des problèmes",
    bot: "Excellent profil ! Les esprits analytiques sont très recherchés. Tu te vois plutôt travailler avec des données et l'informatique, ou avec des problématiques économiques et financières ?",
    chips: [
      { label: "Données et informatique", next: "reco_data" },
      { label: "Économie et finance", next: "reco_finance" }
    ]
  },
  vague_idea: {
    user: "J'ai une vague idée",
    bot: "C'est déjà un bon début ! Tu peux me dire dans quel domaine tu penches, même approximativement ?",
    chips: [
      { label: "Quelque chose dans le numérique / tech", next: "vague_tech" },
      { label: "Les métiers du soin ou du social", next: "vague_care" },
      { label: "Le business, le management", next: "vague_business" }
    ]
  },
  vague_tech: {
    user: "Quelque chose dans le numérique / tech",
    bot: "Super domaine, et très porteur ! Pour affiner, tu te vois plutôt côté création (développer, concevoir des applis) ou côté stratégie (product, data, marketing digital) ?",
    chips: [
      { label: "Créer, coder, construire", next: "reco_data" },
      { label: "Stratégie, produit, business digital", next: "reco_finance" }
    ]
  },
  vague_care: {
    user: "Les métiers du soin ou du social",
    bot: "Un domaine profondément humain. Tu t'orientes plutôt vers le soin médical (infirmier, kiné, médecine) ou l'accompagnement social et éducatif ?",
    chips: [
      { label: "Soin médical ou paramédical", next: "reco_social" },
      { label: "Travail social ou éducatif", next: "reco_education" }
    ]
  },
  vague_business: {
    user: "Le business, le management",
    bot: "Vaste et passionnant ! Tu te vois plutôt dans une grande structure (finance, conseil, RH) ou dans un environnement entrepreneurial, startup ?",
    chips: [
      { label: "Grande entreprise, structure", next: "reco_finance" },
      { label: "Startup, entrepreneuriat", next: "reco_design" }
    ]
  },
  precise_idea: {
    user: "J'ai un projet précis",
    bot: "C'est une position confortable ! Dans quel domaine se situe ton projet ?",
    chips: [
      { label: "Médecine ou santé", next: "reco_social" },
      { label: "Informatique / ingénierie", next: "reco_data" },
      { label: "Commerce / management", next: "reco_finance" }
    ]
  },
  reco_social: {
    user: "Accompagnement ou soin",
    bot: "Voici 3 scénarios adaptés à ton profil :\n\n🛡 Sécurisé — Licence de psychologie → Master conseil\n⚖️ Équilibré — BTS ESF ou éducateur spécialisé\n🚀 Audacieux — Sciences Po, parcours social ou santé publique\n\nLequel résonne le plus avec toi ?",
    chips: [{ label: "En savoir plus sur un parcours", next: "end" }]
  },
  reco_education: {
    user: "Enseignement ou formation",
    bot: "Voici 3 scénarios :\n\n🛡 Sécurisé — Licence + Master MEEF (enseignement)\n⚖️ Équilibré — Sciences de l'éducation, ingénierie pédagogique\n🚀 Audacieux — École de commerce avec spécialisation RH/formation\n\nLequel t'attire le plus ?",
    chips: [{ label: "En savoir plus sur un parcours", next: "end" }]
  },
  reco_design: {
    user: "Design ou créatif",
    bot: "Voici 3 scénarios :\n\n🛡 Sécurisé — BTS Design graphique ou communication\n⚖️ Équilibré — École de design (ESAG, Penninghen, ENSAD)\n🚀 Audacieux — Double cursus design + entrepreneuriat\n\nLequel correspond à ton ambition ?",
    chips: [{ label: "En savoir plus sur un parcours", next: "end" }]
  },
  reco_tech: {
    user: "Construction, technique",
    bot: "Voici 3 scénarios :\n\n🛡 Sécurisé — BTS/IUT génie civil ou électrotechnique\n⚖️ Équilibré — École d'ingénieurs post-bac (INSA, UTC…)\n🚀 Audacieux — Prépa + Grande École d'ingénieurs\n\nLequel te parle ?",
    chips: [{ label: "En savoir plus sur un parcours", next: "end" }]
  },
  reco_data: {
    user: "Données et informatique",
    bot: "Voici 3 scénarios :\n\n🛡 Sécurisé — BTS SIO ou DUT informatique\n⚖️ Équilibré — Licence informatique + Master data / IA\n🚀 Audacieux — École d'ingénieurs spécialisée IA (EPITA, ENSIMAG…)\n\nLequel te correspond ?",
    chips: [{ label: "En savoir plus sur un parcours", next: "end" }]
  },
  reco_finance: {
    user: "Économie et finance",
    bot: "Voici 3 scénarios :\n\n🛡 Sécurisé — BTS comptabilité ou gestion\n⚖️ Équilibré — Licence éco-gestion + Master finance\n🚀 Audacieux — Prépa ECG + Grande École de commerce\n\nLequel t'attire le plus ?",
    chips: [{ label: "En savoir plus sur un parcours", next: "end" }]
  },
  end: {
    user: "En savoir plus sur un parcours",
    bot: "Cette démo illustre le fonctionnement d'OptionBIS 🎓\nEn version complète, l'agent explore ton profil en profondeur et t'accompagne jusqu'à la candidature. Tu veux recommencer avec un autre profil ?",
    chips: [{ label: "↺ Recommencer la démo", next: "restart" }]
  }
};

const msgsEl = document.getElementById('msgs');
const chipsEl = document.getElementById('chips');
const restartBtn = document.getElementById('restartBtn');
let busy = false;

function addMsg(role, text) {
  const w = document.createElement('div');
  w.className = 'm ' + role;
  if (role === 'bot') {
    const av = document.createElement('div');
    av.className = 'av'; av.textContent = 'OB';
    w.appendChild(av);
  }
  const b = document.createElement('div');
  b.className = 'b'; b.textContent = text;
  w.appendChild(b);
  msgsEl.appendChild(w);
  msgsEl.scrollTop = msgsEl.scrollHeight;
  requestAnimationFrame(() => requestAnimationFrame(() => w.classList.add('show')));
}

function showTyping() {
  const w = document.createElement('div');
  w.className = 'm bot show'; w.id = 'typ';
  const av = document.createElement('div');
  av.className = 'av'; av.textContent = 'OB';
  w.appendChild(av);
  const b = document.createElement('div');
  b.className = 'b typ';
  b.innerHTML = '<span></span><span></span><span></span>';
  w.appendChild(b);
  msgsEl.appendChild(w);
  msgsEl.scrollTop = msgsEl.scrollHeight;
}

function removeTyping() { document.getElementById('typ')?.remove(); }

function setChips(chips) {
  chipsEl.innerHTML = '';
  chips.forEach(c => {
    if (c.next === 'restart') {
      const btn = document.createElement('button');
      btn.className = 'chip'; btn.textContent = c.label;
      btn.onclick = () => init();
      chipsEl.appendChild(btn);
      return;
    }
    const btn = document.createElement('button');
    btn.className = 'chip'; btn.textContent = c.label;
    btn.onclick = () => step(c.next, c.label);
    chipsEl.appendChild(btn);
  });
}

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

async function step(key, userText) {
  if (busy) return;
  busy = true;
  setChips([]);
  const flow = FLOWS[key];
  if (!flow) { busy = false; return; }
  if (userText) { addMsg('user', userText); await delay(400); }
  showTyping();
  await delay(900 + Math.random() * 400);
  removeTyping();
  addMsg('bot', flow.bot);
  await delay(200);
  setChips(flow.chips || []);
  busy = false;
}

function init() {
  msgsEl.innerHTML = '';
  chipsEl.innerHTML = '';
  busy = false;
  step('start', null);
}

restartBtn.onclick = init;
init();
</script>
</body>
</html>
